name: Build and Release

permissions:
  contents: read
  checks: write

env:
  HOMEBREW_TAP_REPOSITORY: Divyam-AI/homebrew-tap

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'divyam-cli-release' || format('divyam-cli-ci-{0}', github.event.pull_request.number || github.ref) }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example, v1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify Apache-2.0 license detection
        if: ${{ hashFiles('NOTICE') != '' }}
        run: |
          set -euo pipefail
          export GEM_HOME="$RUNNER_TEMP/gems"
          export GEM_PATH="$GEM_HOME"
          export PATH="$GEM_HOME/bin:$PATH"
          gem install licensee -v 10.0.0 --no-document
          licensee detect . | tee licensee-output.txt
          grep -F "License:        Apache-2.0" licensee-output.txt
          grep -F "Confidence:    100.00%" licensee-output.txt

  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v5

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw_version='${{ github.event.inputs.version }}'
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            raw_version="$GITHUB_REF_NAME"
          else
            raw_version=$(awk -F= '/^version=/{print $2; exit}' cli/gradle.properties)
          fi

          version=${raw_version#v}
          version=${version%-SNAPSHOT}
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be X.Y.Z or vX.Y.Z; received: $raw_version" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$GITHUB_REF_TYPE" == "tag" ]]; then
            is_release=true
          else
            is_release=false
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

  header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Check Headers
        run: ./gradlew spotlessCheck

  linux-build:
    needs: release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: JDK version
        run: java --version

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" test
          else
            ./gradlew test
          fi

      - name: Publish JUnit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Gradle Tests (${{ matrix.arch }})
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload Gradle test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results-${{ matrix.arch }}
          path: |
            **/build/test-results/test
            **/build/reports/tests/test

      - name: Build deb and rpm
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" clean deb rpm
          else
            ./gradlew clean deb rpm
          fi

      - name: Verify package license notices
        if: ${{ hashFiles('NOTICE') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          DEB=$(find . -type f -name "*.deb" -print -quit)
          RPM=$(find . -type f -name "*.rpm" -print -quit)
          test -n "$DEB"
          test -n "$RPM"
          for NOTICE in LICENSE NOTICE; do
            dpkg-deb --fsys-tarfile "$DEB" | tar -tf - | grep -Eq "(^|/)usr/share/doc/divyam-cli/$NOTICE$"
          done
          sudo apt-get update
          sudo apt-get install --yes rpm
          for NOTICE in LICENSE NOTICE; do
            rpm -qlp "$RPM" | grep -Fx "/usr/share/doc/divyam-cli/$NOTICE"
          done

      - name: Run cross-distro smoke tests
        run: |
          chmod +x cli/src/test/scripts/test-binary-across-distros.sh
          cli/src/test/scripts/test-binary-across-distros.sh

      - name: Prepare Linux artifacts
        run: |
          mkdir -p temp-artifacts/linux-packages-${{ matrix.arch }}
          find . -type f -name "*.deb" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          find . -type f -name "*.rpm" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          cp cli/build/native/nativeCompile/divyam temp-artifacts/linux-packages-${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-build:
    needs: release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build native executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew -PreleaseVersion="$RELEASE_VERSION" clean nativeCompile

      - name: Build installer archive and PKG
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew -PreleaseVersion="$RELEASE_VERSION" installerArchive macPkg -x nativeCompile

      - name: Verify installer archive
        shell: bash
        run: |
          set -euo pipefail
          archive="cli/build/distributions/installer/divyam-cli-${RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz"
          test -f "$archive"
          ./.github/scripts/test-macos-artifacts.sh verify-archive "$archive" "$RELEASE_VERSION"

      - name: Prepare macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          destination="temp-artifacts/macos-packages-${{ matrix.arch }}"
          mkdir -p "$destination"
          find cli/build/distributions -type f -name 'divyam-cli*.pkg' -exec cp {} "$destination" \;
          cp "cli/build/distributions/installer/divyam-cli-${RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz" "$destination"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-smoke-tests:
    name: Smoke Tests (macOS)
    runs-on: ${{ matrix.runner }}
    needs: [release-metadata, macos-build]

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: macos-packages-${{ matrix.arch }}
          path: dist/

      - name: Smoke test direct installer
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find dist -type f -name "divyam-cli-${RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz" -print -quit)
          test -n "$archive"
          ./.github/scripts/test-macos-artifacts.sh direct-installer scripts/install.sh "$archive" "$RELEASE_VERSION"
          ./.github/scripts/test-macos-artifacts.sh installer-upgrade scripts/install.sh

      - name: Smoke test Homebrew Cask
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find dist -type f -name "divyam-cli-${RELEASE_VERSION}-darwin-${{ matrix.arch }}.tar.gz" -print -quit)
          test -n "$archive"
          chmod +x scripts/render-homebrew-cask.sh .github/scripts/test-homebrew-cask.sh
          ./.github/scripts/test-homebrew-cask.sh local scripts/render-homebrew-cask.sh "$archive" "$RELEASE_VERSION"

      - name: Smoke test PKG installer
        shell: bash
        run: |
          set -euo pipefail
          pkg=$(find dist -type f -name "divyam-cli-${RELEASE_VERSION}.${{ matrix.arch }}.pkg" -print -quit)
          test -n "$pkg"
          chmod +x .github/scripts/test-macos-artifacts.sh
          ./.github/scripts/test-macos-artifacts.sh pkg "$pkg" "$RELEASE_VERSION"

  docker-images:
    runs-on: ubuntu-22.04
    needs: [release-metadata, linux-build]
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: prod-benchmarking
      GAR_LOCATION: asia-south1
      IMAGE: divyam-cli
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set repository name
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "REPOSITORY=divyam-public-docker-as1" >> "$GITHUB_ENV"
          else
            echo "REPOSITORY=divyam-docker-dev-as1" >> "$GITHUB_ENV"
          fi

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: cli/dist/
          pattern: linux-packages-*

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            version="$RELEASE_VERSION"
          else
            version=$(awk -F= '/^version=/{print $2; exit}' cli/gradle.properties)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/244819244005/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@prod-benchmarking.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$GAR_LOCATION-docker.pkg.dev"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_NO_SUMMARY: true
        with:
          context: ./cli
          file: ./cli/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ steps.get_version.outputs.version }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
          build-args: |
            AMD64_BINARY_DIR=dist/linux-packages-amd64/linux-packages-amd64
            ARM64_BINARY_DIR=dist/linux-packages-arm64/linux-packages-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew-cask-preflight:
    name: Homebrew Cask Release Preflight
    runs-on: ubuntu-22.04
    needs: release-metadata
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read

    steps:
      - name: Require a public Homebrew tap
        shell: bash
        run: |
          set -euo pipefail
          metadata=$(curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/$HOMEBREW_TAP_REPOSITORY")
          test "$(jq --raw-output .private <<< "$metadata")" = false

      - name: Require Homebrew tap automation configuration
        env:
          APP_CLIENT_ID: ${{ vars.DIVYAM_HOMEBREW_TAP_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.DIVYAM_HOMEBREW_TAP_APP_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APP_CLIENT_ID"
          test -n "$APP_PRIVATE_KEY"

      - name: Verify tap write capability
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DIVYAM_HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.DIVYAM_HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: Divyam-AI
          repositories: homebrew-tap
          permission-contents: write

      - name: Verify tap access
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap-preflight
          persist-credentials: false

  release:
    runs-on: ubuntu-22.04
    needs: [header-check, license-check, release-metadata, linux-build, macos-build, macos-smoke-tests, docker-images, homebrew-cask-preflight]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-version.outputs.value }}

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Record release version
        id: release-version
        run: echo "value=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Refuse to overwrite a published release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$RELEASE_VERSION already exists; release assets are immutable." >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Prepare release files and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find release-artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name 'divyam-cli-*.tar.gz' \) -exec cp {} release-files/ \;
          test -f "release-files/divyam-cli-${RELEASE_VERSION}-darwin-arm64.tar.gz"
          test -f "release-files/divyam-cli-${RELEASE_VERSION}-darwin-x86_64.tar.gz"
          chmod +x scripts/render-homebrew-cask.sh .github/scripts/test-homebrew-cask.sh
          ./.github/scripts/test-homebrew-cask.sh verify \
            scripts/render-homebrew-cask.sh \
            "$RELEASE_VERSION" \
            "release-files/divyam-cli-${RELEASE_VERSION}-darwin-arm64.tar.gz" \
            "release-files/divyam-cli-${RELEASE_VERSION}-darwin-x86_64.tar.gz" \
            release-files/divyam-cli.rb
          cp scripts/install.sh release-files/install.sh
          printf '%s\n' "$RELEASE_VERSION" > release-files/latest-version
          (
            cd release-files
            shasum -a 256 -- * > SHA256SUMS
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.release-version.outputs.value }}
          tag_name: v${{ steps.release-version.outputs.value }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

  published-installer-smoke-tests:
    name: Published Installer Smoke Tests (macOS)
    needs: [release-metadata, release]
    if: success()
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Install the published release using its installer
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/test-published-installer.sh "$RELEASE_VERSION"

  publish-homebrew-cask:
    name: Publish Homebrew Cask
    runs-on: ubuntu-22.04
    needs: [release, published-installer-smoke-tests]
    if: needs.release.result == 'success' && needs.published-installer-smoke-tests.result == 'success'
    permissions:
      contents: read

    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Create short-lived tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DIVYAM_HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.DIVYAM_HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: Divyam-AI
          repositories: homebrew-tap
          permission-contents: write

      - name: Download and verify published Cask archives
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "v$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --dir release-assets \
            --pattern SHA256SUMS \
            --pattern "divyam-cli-$RELEASE_VERSION-darwin-arm64.tar.gz" \
            --pattern "divyam-cli-$RELEASE_VERSION-darwin-x86_64.tar.gz"

          for asset in \
            "divyam-cli-$RELEASE_VERSION-darwin-arm64.tar.gz" \
            "divyam-cli-$RELEASE_VERSION-darwin-x86_64.tar.gz"; do
            expected=$(awk -v asset="$asset" '$2 == asset {print $1; exit}' release-assets/SHA256SUMS)
            actual=$(shasum -a 256 "release-assets/$asset" | awk '{print $1}')
            test -n "$expected"
            test "$actual" = "$expected"
          done

      - name: Render verified Cask
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/render-homebrew-cask.sh .github/scripts/test-homebrew-cask.sh
          ./.github/scripts/test-homebrew-cask.sh verify \
            scripts/render-homebrew-cask.sh \
            "$RELEASE_VERSION" \
            "release-assets/divyam-cli-$RELEASE_VERSION-darwin-arm64.tar.gz" \
            "release-assets/divyam-cli-$RELEASE_VERSION-darwin-x86_64.tar.gz" \
            release-assets/divyam-cli.rb

      - name: Check out Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap
          persist-credentials: false

      - name: Update Homebrew Cask
        working-directory: homebrew-tap
        env:
          APP_SLUG: ${{ steps.tap-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Casks
          cp ../release-assets/divyam-cli.rb Casks/divyam-cli.rb
          ruby -c Casks/divyam-cli.rb >/dev/null

          if git diff --quiet -- Casks/divyam-cli.rb; then
            exit 0
          fi

          bot_login="${APP_SLUG}[bot]"
          bot_id=$(gh api "/users/$bot_login" --jq .id)
          git config user.name "$bot_login"
          git config user.email "$bot_id+$bot_login@users.noreply.github.com"
          gh auth setup-git
          git add Casks/divyam-cli.rb
          git commit -m "divyam-cli $RELEASE_VERSION"
          git push origin HEAD:main

  published-homebrew-cask-smoke-tests:
    name: Published Homebrew Cask Smoke Tests (macOS)
    needs: [release-metadata, release, publish-homebrew-cask]
    if: success()
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Install the published Homebrew Cask
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/test-published-homebrew-cask.sh
          ./.github/scripts/test-published-homebrew-cask.sh "$RELEASE_VERSION"

  post-release:
    runs-on: ubuntu-22.04
    needs: [release, published-installer-smoke-tests, publish-homebrew-cask, published-homebrew-cask-smoke-tests]
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Bump to next -SNAPSHOT
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          IFS='.' read -r major minor patch <<< "${{ needs.release.outputs.version }}"
          next_version="$major.$minor.$((patch + 1))-SNAPSHOT"
          echo "next=$next_version" >> "$GITHUB_OUTPUT"
          sed -i "s/^version=.*/version=$next_version/" cli/gradle.properties

      - name: Commit bumped version
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- cli/gradle.properties; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cli/gradle.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.next }}"
          git push origin main
