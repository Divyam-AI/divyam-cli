name: Build and Release

permissions:
  contents: write
  checks: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Check Headers
        run: ./gradlew spotlessCheck

  linux-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: JDK version
        run: java --version

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Publish JUnit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Gradle Tests (${{ matrix.arch }})
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload Gradle test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results-${{ matrix.arch }}
          path: |
            **/build/test-results/test
            **/build/reports/tests/test

      - name: Build deb and rpm
        run: |
          ./gradlew clean deb rpm

      - name: Run cross-distro smoke tests
        run: |
          chmod +x cli/src/test/scripts/test-binary-across-distros.sh
          cli/src/test/scripts/test-binary-across-distros.sh

      - name: Prepare Linux artifacts
        run: |
          mkdir -p temp-artifacts/linux-packages-${{ matrix.arch }}
          find . -type f -name "*.deb" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          find . -type f -name "*.rpm" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          cp cli/build/native/nativeCompile/divyam temp-artifacts/linux-packages-${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build the pkg
        run: |
          chmod +x gradlew
          ./gradlew clean macPkg

      - name: Prepare macOS artifact
        run: |
          mkdir -p temp-artifacts/macos-packages-${{ matrix.arch }}
          find . -type f -name "divyam-cli*.pkg" -exec mv {} temp-artifacts/macos-packages-${{ matrix.arch }} \;

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-smoke-tests:
    name: Smoke Tests (macOS)
    runs-on: ${{ matrix.runner }}
    needs: [ macos-build ]

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: macos-packages-${{ matrix.arch }}
          path: dist/

      - name: Smoke test divyam CLI
        run: |
          set -euo pipefail
          PKG_DIR="dist/macos-packages-${{ matrix.arch }}"
          PKG=$(ls "$PKG_DIR"/*.pkg)
          echo "Installing $PKG"
          sudo installer -pkg "$PKG" -target /
          echo "Running divyam"
          divyam --help


  docker-images:
    runs-on: ubuntu-22.04
    needs: [ linux-build ]
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: prod-benchmarking
      GAR_LOCATION: asia-south1
      IMAGE: divyam-cli

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set repository name
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" == refs/tags/* ]]; then
            echo "REPOSITORY=divyam-router-docker-as1" >> $GITHUB_ENV
          else
            echo "REPOSITORY=divyam-docker-dev-as1" >> $GITHUB_ENV
          fi

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: cli/dist/
          pattern: linux-packages-*

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(grep '^version=' cli/gradle.properties | cut -d'=' -f2)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${VERSION%-SNAPSHOT}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/244819244005/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@prod-benchmarking.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./cli
          file: ./cli/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ steps.get_version.outputs.version }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
          build-args: |
            AMD64_BINARY_DIR=dist/linux-packages-amd64/linux-packages-amd64
            ARM64_BINARY_DIR=dist/linux-packages-arm64/linux-packages-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-22.04
    needs: [ linux-build, macos-build, docker-images ]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Extract release version
        id: get_version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          CLEAN_VERSION="${VERSION/-SNAPSHOT/}"
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^version=.*/version=$CLEAN_VERSION/" cli/gradle.properties

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" \) -exec cp {} release-files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          tag_name: ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-release:
    runs-on: ubuntu-22.04
    needs: [ release ]
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Read released version
        id: released
        run: |
          VERSION=$(grep '^version=' cli/gradle.properties | cut -d'=' -f2)
          echo "released=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump to next -SNAPSHOT
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.released.outputs.released }}"
          NEXT_PATCH=$((PATCH+1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH-SNAPSHOT"
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^version=.*/version=$NEXT_VERSION/" cli/gradle.properties

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cli/gradle.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.next }}"
          git push origin main
