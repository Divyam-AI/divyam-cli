name: Build and Release

permissions:
  contents: read
  checks: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example, v1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw_version='${{ github.event.inputs.version }}'
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            raw_version="$GITHUB_REF_NAME"
          else
            raw_version=$(awk -F= '/^version=/{print $2; exit}' cli/gradle.properties)
          fi

          version=${raw_version#v}
          version=${version%-SNAPSHOT}
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be X.Y.Z or vX.Y.Z; received: $raw_version" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$GITHUB_REF_TYPE" == "tag" ]]; then
            is_release=true
          else
            is_release=false
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

  header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Check Headers
        run: ./gradlew spotlessCheck

  linux-build:
    needs: release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: JDK version
        run: java --version

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" test
          else
            ./gradlew test
          fi

      - name: Publish JUnit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Gradle Tests (${{ matrix.arch }})
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload Gradle test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results-${{ matrix.arch }}
          path: |
            **/build/test-results/test
            **/build/reports/tests/test

      - name: Build deb and rpm
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" clean deb rpm
          else
            ./gradlew clean deb rpm
          fi

      - name: Run cross-distro smoke tests
        run: |
          chmod +x cli/src/test/scripts/test-binary-across-distros.sh
          cli/src/test/scripts/test-binary-across-distros.sh

      - name: Prepare Linux artifacts
        run: |
          mkdir -p temp-artifacts/linux-packages-${{ matrix.arch }}
          find . -type f -name "*.deb" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          find . -type f -name "*.rpm" -exec mv {} temp-artifacts/linux-packages-${{ matrix.arch }} \;
          cp cli/build/native/nativeCompile/divyam temp-artifacts/linux-packages-${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-build:
    needs: release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}
      APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
      APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
      APPLE_NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Validate signing credentials for releases
        if: env.IS_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for credential in \
            APPLE_DEVELOPER_ID_P12 \
            APPLE_DEVELOPER_ID_P12_PASSWORD \
            APPLE_DEVELOPER_ID_APPLICATION \
            APPLE_NOTARY_API_KEY \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID; do
            if [[ -z "${!credential}" ]]; then
              echo "Missing required release secret: $credential" >&2
              exit 1
            fi
          done

      - name: Build native executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" clean nativeCompile
          else
            ./gradlew clean nativeCompile
          fi

      - name: Sign native executable
        if: env.IS_RELEASE == 'true'
        run: ./.github/scripts/sign-macos-binary.sh cli/build/native/nativeCompile/divyam

      - name: Build Cask archive and PKG
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./gradlew -PreleaseVersion="$RELEASE_VERSION" caskArchive macPkg -x nativeCompile
          else
            ./gradlew caskArchive macPkg
          fi

      - name: Verify Cask archive
        shell: bash
        run: |
          set -euo pipefail
          archive="cli/build/distributions/cask/divyam-cli-${RELEASE_VERSION}-macos-${{ matrix.arch }}.zip"
          test -f "$archive"
          if [[ "$IS_RELEASE" == "true" ]]; then
            ./.github/scripts/verify-cask-archive.sh "$archive" "$RELEASE_VERSION"
          else
            temp_dir=$(mktemp -d)
            trap 'rm -rf "$temp_dir"' EXIT
            unzip -q "$archive" -d "$temp_dir"
            "$temp_dir/divyam" --help >/dev/null
          fi

      - name: Notarize Cask archive and assess executable
        if: env.IS_RELEASE == 'true'
        run: |
          ./.github/scripts/notarize-cask-archive.sh \
            "cli/build/distributions/cask/divyam-cli-${RELEASE_VERSION}-macos-${{ matrix.arch }}.zip" \
            cli/build/native/nativeCompile/divyam

      - name: Prepare macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          destination="temp-artifacts/macos-packages-${{ matrix.arch }}"
          mkdir -p "$destination"
          find cli/build/distributions -type f -name 'divyam-cli*.pkg' -exec cp {} "$destination" \;
          cp "cli/build/distributions/cask/divyam-cli-${RELEASE_VERSION}-macos-${{ matrix.arch }}.zip" "$destination"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages-${{ matrix.arch }}
          path: temp-artifacts/

  macos-smoke-tests:
    name: Smoke Tests (macOS)
    runs-on: ${{ matrix.runner }}
    needs: [release-metadata, macos-build]

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-packages-${{ matrix.arch }}
          path: dist/

      - name: Smoke test generated Homebrew Cask
        if: env.IS_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find dist -type f -name "divyam-cli-${RELEASE_VERSION}-macos-${{ matrix.arch }}.zip" -print -quit)
          test -n "$archive"
          ./.github/scripts/smoke-test-homebrew-cask.sh "$archive" "$RELEASE_VERSION"

  docker-images:
    runs-on: ubuntu-22.04
    needs: [release-metadata, linux-build]
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: prod-benchmarking
      GAR_LOCATION: asia-south1
      IMAGE: divyam-cli
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      IS_RELEASE: ${{ needs.release-metadata.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set repository name
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" == refs/tags/* ]]; then
            echo "REPOSITORY=divyam-public-docker-as1" >> "$GITHUB_ENV"
          else
            echo "REPOSITORY=divyam-docker-dev-as1" >> "$GITHUB_ENV"
          fi

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: cli/dist/
          pattern: linux-packages-*

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_RELEASE" == "true" ]]; then
            version="$RELEASE_VERSION"
          else
            version=$(awk -F= '/^version=/{print $2; exit}' cli/gradle.properties)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/244819244005/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@prod-benchmarking.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$GAR_LOCATION-docker.pkg.dev"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_NO_SUMMARY: true
        with:
          context: ./cli
          file: ./cli/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ steps.get_version.outputs.version }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
          build-args: |
            AMD64_BINARY_DIR=dist/linux-packages-amd64/linux-packages-amd64
            ARM64_BINARY_DIR=dist/linux-packages-arm64/linux-packages-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-22.04
    needs: [release-metadata, linux-build, macos-build, macos-smoke-tests, docker-images]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: write
      contents: write
    outputs:
      version: ${{ steps.release-version.outputs.value }}

    env:
      RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
      HOMEBREW_CASK_APP_ID: ${{ secrets.HOMEBREW_CASK_APP_ID }}
      HOMEBREW_CASK_APP_PRIVATE_KEY: ${{ secrets.HOMEBREW_CASK_APP_PRIVATE_KEY }}
      HOMEBREW_CASK_PR_TOKEN: ${{ secrets.HOMEBREW_CASK_PR_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Record release version
        id: release-version
        run: echo "value=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate Homebrew automation credentials
        shell: bash
        run: |
          set -euo pipefail
          for credential in \
            HOMEBREW_CASK_APP_ID \
            HOMEBREW_CASK_APP_PRIVATE_KEY \
            HOMEBREW_CASK_PR_TOKEN; do
            if [[ -z "${!credential}" ]]; then
              echo "Missing required release secret: $credential" >&2
              exit 1
            fi
          done

      - name: Refuse to overwrite a published release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$RELEASE_VERSION already exists; release assets are immutable." >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Prepare release files and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find release-artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name 'divyam-cli-*.zip' \) -exec cp {} release-files/ \;
          test -f "release-files/divyam-cli-${RELEASE_VERSION}-macos-arm64.zip"
          test -f "release-files/divyam-cli-${RELEASE_VERSION}-macos-x86_64.zip"
          (
            cd release-files
            shasum -a 256 -- * > SHA256SUMS
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.release-version.outputs.value }}
          tag_name: v${{ steps.release-version.outputs.value }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Dispatch the Homebrew Cask update
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run homebrew-cask-update.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f version="$RELEASE_VERSION"

  post-release:
    runs-on: ubuntu-22.04
    needs: release
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Bump to next -SNAPSHOT
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          IFS='.' read -r major minor patch <<< "${{ needs.release.outputs.version }}"
          next_version="$major.$minor.$((patch + 1))-SNAPSHOT"
          echo "next=$next_version" >> "$GITHUB_OUTPUT"
          sed -i "s/^version=.*/version=$next_version/" cli/gradle.properties

      - name: Commit bumped version
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- cli/gradle.properties; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cli/gradle.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.next }}"
          git push origin main
